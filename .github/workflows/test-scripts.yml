name: Test Scripts

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # gen-passwd
  # ─────────────────────────────────────────────────────────────────────────────
  test-gen-passwd:
    name: Test gen-passwd
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Make executable
        run: chmod +x common-bin/gen-passwd

      - name: Default length is 16
        run: |
          output=$(common-bin/gen-passwd)
          len=${#output}
          [ "$len" -eq 16 ] || { echo "FAIL: expected length 16, got $len ('$output')"; exit 1; }
          echo "PASS: default length = $len"

      - name: Custom length (32)
        run: |
          output=$(common-bin/gen-passwd 32)
          len=${#output}
          [ "$len" -eq 32 ] || { echo "FAIL: expected length 32, got $len"; exit 1; }
          echo "PASS: custom length = $len"

      - name: Uppercase-only flag (-u)
        run: |
          output=$(common-bin/gen-passwd -u 20)
          echo "$output" | grep -qE '^[A-Z]+$' \
            || { echo "FAIL: expected only uppercase, got: $output"; exit 1; }
          echo "PASS: uppercase only: $output"

      - name: Numbers-only flag (-n)
        run: |
          output=$(common-bin/gen-passwd -n 20)
          echo "$output" | grep -qE '^[0-9]+$' \
            || { echo "FAIL: expected only numbers, got: $output"; exit 1; }
          echo "PASS: numbers only: $output"

      - name: Lowercase-only flag (-l)
        run: |
          output=$(common-bin/gen-passwd -l 20)
          echo "$output" | grep -qE '^[a-z]+$' \
            || { echo "FAIL: expected only lowercase, got: $output"; exit 1; }
          echo "PASS: lowercase only: $output"

      - name: Combined flags (-u -l -n)
        run: |
          output=$(common-bin/gen-passwd -u -l -n 40)
          len=${#output}
          [ "$len" -eq 40 ] || { echo "FAIL: expected length 40, got $len"; exit 1; }
          echo "$output" | grep -qE '^[A-Za-z0-9]+$' \
            || { echo "FAIL: unexpected chars in: $output"; exit 1; }
          echo "PASS: combined flags: $output"

      - name: Non-numeric length argument exits non-zero
        run: |
          common-bin/gen-passwd abc && { echo "FAIL: should have exited non-zero"; exit 1; } || echo "PASS: non-numeric length rejected"

  # ─────────────────────────────────────────────────────────────────────────────
  # repeat-until-success
  # ─────────────────────────────────────────────────────────────────────────────
  test-repeat-until-success:
    name: Test repeat-until-success
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Make executable
        run: chmod +x common-bin/repeat-until-success

      - name: Succeeds immediately with 'true'
        run: common-bin/repeat-until-success -n 3 -s 0 true

      - name: Fails after max retries with 'false'
        run: |
          common-bin/repeat-until-success -n 3 -s 0 false \
            && { echo "FAIL: should have exited non-zero after max retries"; exit 1; } \
            || echo "PASS: exited non-zero after max retries"

      - name: Succeeds on later attempt
        run: |
          # Write a counter to a temp file; succeed once count reaches 3
          COUNT_FILE=$(mktemp)
          echo 0 > "$COUNT_FILE"
          TRY_SCRIPT=$(mktemp)
          cat > "$TRY_SCRIPT" <<EOF
          #!/bin/bash
          count=\$(cat "$COUNT_FILE")
          count=\$((count + 1))
          echo \$count > "$COUNT_FILE"
          [ "\$count" -ge 3 ]
          EOF
          chmod +x "$TRY_SCRIPT"
          common-bin/repeat-until-success -n 5 -s 0 "$TRY_SCRIPT"
          final=$(cat "$COUNT_FILE")
          [ "$final" -eq 3 ] || { echo "FAIL: expected 3 attempts, got $final"; exit 1; }
          echo "PASS: succeeded on attempt $final"

  # ─────────────────────────────────────────────────────────────────────────────
  # sum
  # ─────────────────────────────────────────────────────────────────────────────
  test-sum:
    name: Test sum
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Make executable
        run: chmod +x common-bin/sum

      - name: Sum a list of integers
        run: |
          result=$(printf '1\n2\n3\n4\n5\n' | common-bin/sum)
          [ "$result" -eq 15 ] || { echo "FAIL: expected 15, got $result"; exit 1; }
          echo "PASS: 1+2+3+4+5 = $result"

      - name: Sum with negative numbers
        run: |
          result=$(printf '10\n-3\n7\n' | common-bin/sum)
          [ "$result" -eq 14 ] || { echo "FAIL: expected 14, got $result"; exit 1; }
          echo "PASS: 10+(-3)+7 = $result"

      - name: Sum a single number
        run: |
          result=$(echo 42 | common-bin/sum)
          [ "$result" -eq 42 ] || { echo "FAIL: expected 42, got $result"; exit 1; }
          echo "PASS: sum(42) = $result"

  # ─────────────────────────────────────────────────────────────────────────────
  # install-go  (download + install a real Go release)
  # ─────────────────────────────────────────────────────────────────────────────
  test-install-go:
    name: Test install-go
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Make executable
        run: chmod +x common-bin/install-go

      - name: Create SDK directory
        run: mkdir -p "$HOME/software/sdk"

      - name: List available versions (-l flag)
        run: common-bin/install-go -l | tail -5

      - name: Install Go 1.22.4
        run: common-bin/install-go -v go1.22.4

      - name: Verify installation directory exists
        run: |
          [ -d "$HOME/software/sdk/go1.22.4" ] \
            || { echo "FAIL: sdk dir not found"; exit 1; }
          echo "PASS: go1.22.4 installed at $HOME/software/sdk/go1.22.4"

      - name: Already-installed short-circuits cleanly
        run: common-bin/install-go -v go1.22.4

      - name: Rejects malformed version
        run: |
          common-bin/install-go -v 1.22.4 \
            && { echo "FAIL: should reject version missing 'go' prefix"; exit 1; } \
            || echo "PASS: malformed version rejected"

  # ─────────────────────────────────────────────────────────────────────────────
  # switch-go  (requires install-go to have run first; uses a matrix)
  # ─────────────────────────────────────────────────────────────────────────────
  test-switch-go:
    name: Test switch-go
    runs-on: ubuntu-latest
    needs: test-install-go   # re-run install so SDK dir is populated

    steps:
      - uses: actions/checkout@v4

      - name: Make executables
        run: chmod +x common-bin/install-go common-bin/switch-go

      - name: Set up SDK dir and install two Go versions
        run: |
          mkdir -p "$HOME/software/sdk"
          common-bin/install-go -v go1.22.4
          common-bin/install-go -v go1.21.12

      - name: List installed versions (-l flag)
        run: common-bin/switch-go -l

      - name: Switch to go1.21.12
        run: |
          common-bin/switch-go -v go1.21.12
          target=$(readlink "$HOME/software/sdk/go")
          echo "Symlink points to: $target"
          echo "$target" | grep -q "go1.21.12" \
            || { echo "FAIL: symlink should point to go1.21.12"; exit 1; }
          echo "PASS"

      - name: Switch to go1.22.4
        run: |
          common-bin/switch-go -v go1.22.4
          target=$(readlink "$HOME/software/sdk/go")
          echo "$target" | grep -q "go1.22.4" \
            || { echo "FAIL: symlink should point to go1.22.4"; exit 1; }
          echo "PASS"

      - name: Rejects uninstalled version
        run: |
          common-bin/switch-go -v go9.9.9 \
            && { echo "FAIL: should reject uninstalled version"; exit 1; } \
            || echo "PASS: uninstalled version rejected"
